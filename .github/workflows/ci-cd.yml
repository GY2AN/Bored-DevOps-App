name : CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        name: Run Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Set Up Python
              uses: actions/setup-python@v4
              with:
                  python-version: '3.11'
            
            - name: Install dependencies
              run: pip install -r requirements.txt
            
            - name: Run tests
              run: pytest test_app.py -v
    
    build-and-push:
        name: Build Docker Image
        runs-on: ubuntu-latest
        needs: test
        if: github.ref == 'refs/heads/main'

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME}}
                password: ${{ secrets.DOCKERHUB_TOKEN}}
            
            - name: Build and Push image
              uses: docker/build-push-action@v5
              with:
                context: .
                push: true
                tags: |
                    ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
                    ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ github.sha }}


    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        needs: build-and-push
        if: github.ref == 'refs/heads/main'

        steps:
            - name: Simulate deployment
              run: |
                echo "✅ Deploying image: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ github.sha }}"
                echo "📦 docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest"
                echo "🚀 docker run -d -p 5000:5000 ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest"
                echo "✨ Deployment complete!"